name: Build installers

# Builds the ModpackInstaller for Windows, macOS, and Linux.
# Triggers:
#   - manually (workflow_dispatch)
#   - on push of a version tag like v1.0.0 -> also creates a GitHub Release
#   - on pushes to main (artifacts only, no release)

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write  # needed to create releases

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: ModpackInstaller-Windows
          - os: macos-latest
            artifact: ModpackInstaller-macOS
          - os: ubuntu-latest
            artifact: ModpackInstaller-Linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller Pillow certifi customtkinter

      - name: Stamp version (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: python
        run: |
          import os
          tag = os.environ["GITHUB_REF_NAME"]
          with open("core/version.py", "w", encoding="utf-8") as f:
              f.write('"""Application version (stamped by CI)."""\n\n')
              f.write(f'APP_VERSION = "{tag}"\n')
          print("Stamped APP_VERSION =", tag)

      - name: Generate icon
        run: python build/make_icon.py

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm build/installer.spec

      # --- Package per-OS so the upload is a single, sensibly named file ---

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item dist/ModpackInstaller.exe out/ModpackInstaller.exe

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p out
          # dist/ModpackInstaller.app is a bundle (folder); zip it for upload.
          cd dist && zip -r -y ../out/ModpackInstaller-macOS.zip ModpackInstaller.app

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p out
          cp dist/ModpackInstaller out/ModpackInstaller
          chmod +x out/ModpackInstaller

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: out/*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
